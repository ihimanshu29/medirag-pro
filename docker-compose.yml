version: "3.9"

services:
  # ── Vector Store ──────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: medirag_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Relational DB (session memory + metadata) ─────────────────
  postgres:
    image: postgres:16-alpine
    container_name: medirag_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: medirag
      POSTGRES_USER: medirag
      POSTGRES_PASSWORD: medirag_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medirag -d medirag"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MediRAG API ───────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medirag_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      QDRANT_HOST: qdrant
      POSTGRES_HOST: postgres
    volumes:
      - ./data:/app/data
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  qdrant_data:
  postgres_data:
