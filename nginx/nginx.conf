# Nginx config for VPS deployment.
# Routes:
#   yourdomain.com        → Streamlit frontend (port 8501)
#   api.yourdomain.com    → FastAPI backend  (port 8000)
#   /health, /metrics     → directly from nginx → API
#
# For HTTPS: place fullchain.pem and privkey.pem in nginx/certs/
# and uncomment the SSL server blocks below.

events {
    worker_connections 1024;
}

http {
    upstream api {
        server api:8000;
    }

    upstream frontend {
        server frontend:8501;
    }

    # ── HTTP (redirect to HTTPS in production) ────────────────────
    server {
        listen 80;
        server_name _;

        # Health check — no redirect (needed by Docker health checks)
        location /health {
            proxy_pass http://api;
            proxy_set_header Host $host;
        }

        # API routes
        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            client_max_body_size 50M;
            proxy_read_timeout 60s;
        }

        location /docs {
            proxy_pass http://api;
        }

        location /metrics {
            proxy_pass http://api;
        }

        # Streamlit frontend (WebSocket support required)
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
        }
    }

    # ── HTTPS (uncomment and add certs for production) ─────────────
    # server {
    #     listen 443 ssl;
    #     server_name yourdomain.com;
    #
