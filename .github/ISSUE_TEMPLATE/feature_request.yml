name: Feature Request
description: Suggest a new capability or improvement
labels: ["enhancement"]
assignees: []

body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: Currently the system cannot X, which means Y...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: I think we could add X by doing Y...
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Which area does this affect?
      options:
        - Retrieval quality
        - Generation quality
        - Safety / guardrails
        - Evaluation framework
        - Performance / latency
        - Deployment / infrastructure
        - Developer experience
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: effort
    attributes:
      label: Estimated effort
      options:
        - Small (< 1 day)
        - Medium (1–3 days)
        - Large (> 3 days)
        - Unknown

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I would be willing to implement this myself
