name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dev dependencies
        run: |
          pip install ruff mypy pydantic pydantic-settings structlog fastapi

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality

    services:
      qdrant:
        image: qdrant/qdrant:v1.12.4
        ports:
          - 6333:6333
        options: >-
          --health-cmd "curl -f http://localhost:6333/healthz"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: medirag_test
          POSTGRES_USER: medirag
          POSTGRES_PASSWORD: medirag_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U medirag -d medirag_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      QDRANT_HOST: localhost
      POSTGRES_HOST: localhost
      POSTGRES_DB: medirag_test
      POSTGRES_USER: medirag
      POSTGRES_PASSWORD: medirag_secret

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies (CPU torch)
        run: |
          pip install --extra-index-url https://download.pytorch.org/whl/cpu \
            -r requirements.txt

      - name: Run tests
        run: pytest tests/ --cov=src --cov-report=term-missing -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
